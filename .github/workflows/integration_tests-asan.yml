name: Integration tests ASAN

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: integration-tests-asan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Silently skip (rather than fail) on non-release branches, for both push
  # and pull_request events. The allowed branches are listed in
  # .github/release-branches.txt. A job whose `if` is false is reported as
  # skipped, so feature-branch pushes no longer show up as failed checks.
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Verify Branch
      id: check
      env:
        BRANCH: ${{ github.base_ref || github.ref_name }}
      run: |
        if grep -qxF "$BRANCH" .github/release-branches.txt; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
        fi

  integration-tests-asan:
    needs: check-branch
    if: needs.check-branch.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up Docker to build and run the container
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    # Build the Docker image from the Dockerfile in your repo
    - name: Build Docker Image
      run: docker build -t presubmit-image -f .devcontainer/Dockerfile .

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-integration-asan-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ccache-integration-asan-${{ github.ref }}-
          ccache-integration-asan-


    - name: Run Integration Tests
      id: test-run
      timeout-minutes: 140
      continue-on-error: true
      run: |
        mkdir -p test-results .ccache
        docker run --privileged --rm \
          --mount type=bind,source="$(pwd)/test-results",target=/workspace/test-results \
          -v "$(pwd):/workspace" \
          -e CCACHE_DIR=/workspace/.ccache \
          -e CCACHE_MAXSIZE=1G \
          --user "ubuntu:ubuntu" \
          presubmit-image \
          sudo -E ci/build_ubuntu.sh --run-integration-tests --asan --integration-output=/workspace/test-results

    - name: Update Test Results Permissions
      if: always()
      run: sudo chmod -R 755 test-results

    # Upload test results as artifacts
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: test-results

    # Fail the job if tests failed
    - name: Check Test Results
      if: steps.test-run.outcome == 'failure'
      run: exit 1
