name: Integration tests ASAN

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: integration-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests-asan:
    runs-on: ubuntu-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Verify Branch
      env:
        BRANCH: ${{ github.base_ref || github.ref_name }}
      run: grep -qxF "$BRANCH" .github/release-branches.txt

    # Set up Docker to build and run the container
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    # Build the Docker image from the Dockerfile in your repo
    - name: Build Docker Image
      run: docker build -t presubmit-image -f .devcontainer/Dockerfile .

    - name: Run Integration Tests
      run: docker run --privileged --rm  -v "$(pwd):/workspace" --user "ubuntu:ubuntu" presubmit-image sudo ci/build_ubuntu.sh --asan --run-integration-tests
