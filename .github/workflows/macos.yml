name: unittests-macos

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: unittests-macos-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Verify Branch
      id: check
      env:
        BRANCH: ${{ github.base_ref || github.ref_name }}
      run: |
        if grep -qxF "$BRANCH" .github/release-branches.txt; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
        fi

  cmake-tests-macos:
    needs: check-branch
    if: needs.check-branch.outputs.should_run == 'true'
    runs-on: macos-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up Docker to build and run the container
    - name: Build Code
      run: ./build.sh
