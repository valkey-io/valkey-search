name: unittests-macos

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: unittests-macos-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          BRANCH: ${{ github.base_ref || github.ref_name }}
        run: |
          if grep -qxF "$BRANCH" .github/release-branches.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  cmake-tests-macos:
    needs: check-branch
    if: needs.check-branch.outputs.should_run == 'true'
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Code
      run: ./build.sh
