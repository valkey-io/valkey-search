name: unittests-macos

on:
  pull_request:
    branches:
      - main
      - "[0-9].[0-9]"
    paths-ignore:
      - '**/*.md'
      - '**/00-RELEASENOTES'
  push:
    branches:
      - main
      - "[0-9].[0-9]"
    paths-ignore:
      - '**/*.md'
      - '**/00-RELEASENOTES'
  workflow_dispatch:

concurrency:
  group: unittests-macos-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  cmake-tests-macos:
    runs-on: macos-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Expose runner image identity for cache key
      run: |
        echo "IMAGE_OS=$ImageOS" >> "$GITHUB_ENV"
        echo "IMAGE_VERSION=$ImageVersion" >> "$GITHUB_ENV"

    - name: Restore highwayhash cache
      uses: actions/cache@v4
      with:
        path: ~/valkey-search-deps
        key: macos-highwayhash-${{ runner.os }}-${{ env.IMAGE_OS }}-${{ env.IMAGE_VERSION }}-${{ hashFiles('ci/build_macos.sh') }}
        # No restore-keys deliberately: an exact-match-only key means a cache miss
        # (OS bump, image refresh, or a ref change in the script) always triggers a
        # clean rebuild rather than risking a stale/incompatible binary being reused.

    - name: Build Code
      run: ci/build_macos.sh
