name: unittests-asan

on:
  pull_request: # This triggers the workflow for pull requests
    branches:
      - main    # Run tests for pull requests targeting the "main" branch
      - fulltext
  push:
    branches:
      - main    # Optional: Run tests for direct pushes to "main"
      - fulltext
  workflow_dispatch: # allow manual triggering

concurrency:
  group: unittests-asan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  cmake-tests:
    runs-on: ubuntu-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up Docker to build and run the container
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    # Build the Docker image from the Dockerfile in your repo
    - name: Build Docker Image
      run: |
        echo "::group::Docker Build"
        DOCKER_START=$(date +%s)
        docker build -t presubmit-image -f .devcontainer/Dockerfile .
        DOCKER_END=$(date +%s)
        echo "::endgroup::"
        echo "[TIMING] Docker Image Build: $((DOCKER_END - DOCKER_START))s"

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-unittests-asan-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ccache-unittests-asan-${{ github.ref }}-
          ccache-unittests-asan-

    - name: Build and Run Unit Tests (ASAN)
      id: test-run
      continue-on-error: true
      run: |
        mkdir -p test-results .ccache
        echo "[TIMING] Build+Test (ASAN) started at $(date)"
        TEST_START=$(date +%s)
        docker run --privileged --rm \
          --mount type=bind,source="$(pwd)/test-results",target=/workspace/test-results \
          -v "$(pwd):/workspace" \
          --user "ubuntu:ubuntu"
          -e CCACHE_DIR=/workspace/.ccache
          -e CCACHE_MAXSIZE=1G \
          presubmit-image \
          sudo -E ci/build_ubuntu.sh --run-tests --asan --unittest-output=/workspace/test-results
        TEST_END=$(date +%s)
        echo "[TIMING] Build+Test (ASAN) completed in $((TEST_END - TEST_START))s"

    - name: Update Test Results Permissions
      if: always()
      run: sudo chmod -R 755 test-results

     # Upload test results as artifacts
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unittest-results
        path: test-results

    # Fail the job if tests failed
    - name: Check Test Results
      if: steps.test-run.outcome == 'failure'
      run: exit 1
